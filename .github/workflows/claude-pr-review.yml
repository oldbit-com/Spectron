name: Claude PR Review (on demand)

# Trigger: comment "/review-claude" on any pull request.
on:
  issue_comment:
    types: [created]

# Only run for PR comments (not plain issue comments) that contain the trigger phrase.
jobs:
  claude-review:
    if: |
      github.event.issue.pull_request != null &&
      contains(github.event.comment.body, '/review-claude')
    runs-on: ubuntu-latest
    permissions:
      contents: read          # read the code
      pull-requests: write    # post review comments
      issues: write           # post the trigger-acknowledgement / @claude mentions
      id-token: write         # required by the action
    steps:
      # The action needs the PR branch checked out. For issue_comment events the
      # default checkout is the base branch, so we resolve the PR head explicitly.
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out the PR head
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh pr checkout ${{ github.event.issue.number }}

      # Optional: build the project so Claude can see compiler output / warnings
      # while reviewing. Remove this block if you want faster, source-only reviews.
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build --configuration Debug
        continue-on-error: true   # don't abort the review if the PR doesn't compile

      - name: Run Claude review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            Review this pull request for the Spectron project — a ZX Spectrum
            emulator written in C# with Avalonia UI, targeting macOS ARM64.

            Focus areas, in priority order:
            1. Emulation correctness — Z80 instruction behaviour, T-state timing,
               ULA bus contention, memory access patterns. Subtle off-by-one or
               timing errors matter here more than anything else.
            2. Logic errors, broken edge cases, and regressions.
            3. Threading / UI correctness — Avalonia dispatcher usage,
               CommunityToolkit.Mvvm patterns, cross-platform gesture handling.
            4. Adherence to the conventions documented in CLAUDE.md, if present
               in the repo. Treat newly introduced violations as nit-level findings
               and cite the exact rule.

            Do not flag style issues a formatter/analyzer already handles, and do
            not flag anything you are not confident is a real problem — false
            positives waste reviewer time.

            The PR branch is already checked out in the working directory.
            Use `gh pr comment` for top-level summary feedback.
            Use `mcp__github_inline_comment__create_inline_comment` (with
            `confirmed: true`) for specific line-level issues.
            Only post GitHub comments — do not return the review as a chat message.
          claude_args: |
            --max-turns 20
            --model claude-opus-4-7
            --allowedTools "Bash(dotnet build),Bash(dotnet test),Bash(gh pr view:*),Bash(gh pr diff:*),Read,Grep,Glob"